<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding-top: 50px; /* Space for fixed header */
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #estimatesList {
            flex-grow: 1;
            padding: 20px;
        }
        #estimatesList h2 {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        table, th, td {
            border: 1px solid #d1d5db;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f8f8f8;
            font-weight: bold;
        }
        td button {
            padding: 6px 12px;
            background-color: #4b5563;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        td button:hover {
            background-color: #6b7280;
        }
        /* Style for the details row */
        .details-row {
            display: none; /* Hidden by default */
            background-color: #f9fafb;
        }
        .details-row td {
            padding: 15px;
        }
        .details-row table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: transparent;
            box-shadow: none;
        }
        .details-row table th, .details-row table td {
            border: 1px solid #e5e7eb;
            padding: 8px;
        }
        .details-row table th {
            background-color: #e5e7eb;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #f8f8f8;
            border-bottom: 1px solid #ccc;
            padding: 8px 20px; /* Match index.html */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            height: 40px; /* Fixed height for minimalism */
        }
        .logo {
            width: 60px; /* Укажите ширину логотипа */
            height: auto; /* Сохраняет пропорции */
            margin-right: 20px; /* Отступ справа от логотипа */
        }
        .home-btn {
            background: none;
            border: none;
            font-size: 20px; /* Match index.html */
            font-weight: 500; /* Lighter weight */
            color: #333;
            cursor: pointer;
            padding: 4px 8px; /* Match nav-tabs padding */
            transition: background-color 0.2s ease;
        }
        .home-btn:hover {
            background-color: #e0e0e0;
            border-radius: 4px;
        }
        .home-btn.active {
            background-color: #4b5563;
            color: white;
            border-radius: 4px;
            position: relative;
        }
        .home-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px; /* Thinner underline */
            background-color: #1f2937;
            border-radius: 2px;
        }
        .nav-tabs {
            display: flex;
            gap: 15px; /* Reduced gap */
            margin-right: 20px;
        }
        .nav-tabs a, .nav-tabs button {
            text-decoration: none;
            color: #333;
            font-size: 14px; /* Smaller font size */
            padding: 4px 8px; /* Reduced padding */
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            transition: color 0.2s ease, background-color 0.2s ease;
        }
        .nav-tabs a:hover, .nav-tabs button:hover {
            background-color: #e0e0e0;
            border-radius: 4px;
        }
        .nav-tabs a.active, .nav-tabs button.active {
            background-color: #4b5563;
            color: white;
            border-radius: 4px;
            position: relative;
        }
        .nav-tabs a.active::after, .nav-tabs button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px; /* Thinner underline */
            background-color: #1f2937;
            border-radius: 2px;
        }
        .contact-info {
            display: flex;
            align-items: center;
            gap: 15px; /* Space between items */
            font-size: 12px; /* Smaller font size for minimalism */
            color: #333;
            white-space: nowrap; /* Prevent wrapping */
        }
        .contact-item {
            margin: 0; /* Remove default margins */
        }
        .contact-info a.phone {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500; /* Slightly bold for emphasis */
        }
        .contact-info a.phone:hover {
            text-decoration: underline;
        }
        .call-back-btn {
            padding: 4px 8px; /* Smaller padding */
            background-color: #f97316; /* Orange color */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px; /* Smaller font size */
            cursor: pointer;
            white-space: nowrap; /* Prevent wrapping */
        }
        .call-back-btn:hover {
            background-color: #fb923c; /* Lighter orange on hover */
        }
    </style>
</head>
<body>
    <div id="header"></div>
    <div id="estimatesList">
        <h2>Ваши сметы</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Дата</th>
                    <th>Стоимость</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="estimatesTableBody">
                <!-- Estimates will be populated by cabinet.js -->
            </tbody>
        </table>
    </div>
    <script>
        // Load header.html and header.js
        fetch('/static/partials/header.html')
            .then(response => {
                if (!response.ok) throw new Error('Failed to fetch header.html');
                return response.text();
            })
            .then(data => {
                document.getElementById('header').innerHTML = data;
                // Load header.js after header is inserted
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = '/static/js/header.js';
                    script.onload = () => {
                        console.log('cabinet.html: header.js loaded, calling updateTabVisibility');
                        // Immediately update tab visibility after loading header.js
                        if (typeof window.updateTabVisibility === 'function') {
                            window.updateTabVisibility();
                        }
                        resolve();
                    };
                    script.onerror = () => reject(new Error('Failed to load header.js'));
                    document.body.appendChild(script);
                });
            })
            .catch(error => {
                console.error('Error loading header:', error);
            });
    </script>
    <script src="/static/cabinet.js"></script>
</body>
</html>
